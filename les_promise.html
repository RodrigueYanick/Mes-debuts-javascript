        function waitsync(duration) {
            const t = Date.now()
            while (Date.now() - t < duration){

            }
        }

        function wait (duration) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve(duration)
                }, duration);
            })
        }


        function waitAndFail (duration) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    reject(duration)
                }, duration);
            })
        }

        async function main() {
            const duration = await wait(2000);
            console.log(`Attente de ${duration}ms`);
            return 5;
        }

        main().then(n => console.log('Le nombre', n));

        wait(2000)
        .then(() => {
            console.log('Attente 2s');
            return wait(1000);
        })
        .then(() => {
            console.log('Attente 1s');
        })

        

        Promise.race([waitAndFail(1000), wait(2000)])
        .then(console.log)
