        class Livre {

            #page = 1;

            constructor(titre, nbPages) {
                this.titre = titre;
                this.nbPages = nbPages;
            }

            nextPage() {
                if(this.#page < this.nbpages) {
                    this.#page++;
                }
            }

            get numberPage() {
                return this.#page;
            }

            clossLivre() {
                this.#page = 1; 
            }

        }

        class Library extends Livre {

            #books = []

            addBook(book) {
                this.#books.push(book);
            }

            addBooks(books) {
                books.forEach(this.addBook, this);
            }

            findBook(letter) {
                return this.#books.filter((book) => book.titre[0].toLowerCase() === letter.toLowerCase());
            }

             get numberOfBooks() {
                return this.#books.length;
             }
        }

        const b = new Livre('Seigneur des anneaux', 1000);
        console.log(b.numberPage);
        b.nextPage();
        console.log(b.numberPage);  
        b.clossLivre();
        console.log(b.numberPage);

        const lib = new Library();
        lib.addBook(b);
        lib.addBooks([
            new Livre('Harry Potter', 500),
            new Livre('Le petit prince', 200),
            new Livre('Le seigneur des anneaux', 1000)
